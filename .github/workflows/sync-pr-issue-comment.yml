name: Sync PR Issue Comment

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  sync-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update linked PR comment on issue
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr.body || ''
            const issueMatch = body.match(/Issue:\s+#(\d+)/)

            if (!issueMatch) {
              core.info('No `Issue: #<number>` line found; skipping issue comment sync.')
              return
            }

            const issueNumber = Number(issueMatch[1])
            const marker = '<!-- jobflow-linked-pr -->'
            const commentBody = [
              marker,
              `Linked PR: #${pr.number}`,
              `PR: ${pr.html_url}`,
              `Branch: \`${pr.head.ref}\``,
              `State: ${pr.state}`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              })
              core.info(`Updated linked PR comment on issue #${issueNumber}.`)
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody,
            })
            core.info(`Created linked PR comment on issue #${issueNumber}.`)
