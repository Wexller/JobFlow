services:
  postgres:
    image: postgres:16-alpine
    container_name: ${JOBFLOW_LOCAL_DB_CONTAINER:-jobflow-local-postgres}
    ports:
      - "${JOBFLOW_LOCAL_DB_PORT:-55432}:5432"
    environment:
      POSTGRES_USER: ${JOBFLOW_LOCAL_DB_USER:-jobflow}
      POSTGRES_PASSWORD: ${JOBFLOW_LOCAL_DB_PASSWORD:-jobflow}
      POSTGRES_DB: ${JOBFLOW_LOCAL_DB_NAME:-jobflow_local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JOBFLOW_LOCAL_DB_USER:-jobflow} -d ${JOBFLOW_LOCAL_DB_NAME:-jobflow_local}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - jobflow_local_postgres_data:/var/lib/postgresql/data

  app:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.14.4 --activate &&
      pnpm install &&
      pnpm dev --host 0.0.0.0 --port ${JOBFLOW_APP_PORT:-3000}"
    ports:
      - "${JOBFLOW_APP_PORT:-3000}:${JOBFLOW_APP_PORT:-3000}"
    environment:
      JOBFLOW_PERSISTENCE_DRIVER: postgres
      JOBFLOW_DATABASE_URL: postgres://${JOBFLOW_LOCAL_DB_USER:-jobflow}:${JOBFLOW_LOCAL_DB_PASSWORD:-jobflow}@postgres:5432/${JOBFLOW_LOCAL_DB_NAME:-jobflow_local}
      NUXT_PUBLIC_APP_ENV: ${NUXT_PUBLIC_APP_ENV:-local}
      NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-en}
      NUXT_PUBLIC_FALLBACK_LOCALE: ${NUXT_PUBLIC_FALLBACK_LOCALE:-en}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - jobflow_local_node_modules:/workspace/node_modules

volumes:
  jobflow_local_postgres_data:
  jobflow_local_node_modules:
