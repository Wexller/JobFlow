services:
  postgres:
    image: postgres:16-alpine
    container_name: ${JOBFLOW_PROD_DB_CONTAINER:-jobflow-prod-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${JOBFLOW_PROD_DB_USER:?set JOBFLOW_PROD_DB_USER}
      POSTGRES_PASSWORD: ${JOBFLOW_PROD_DB_PASSWORD:?set JOBFLOW_PROD_DB_PASSWORD}
      POSTGRES_DB: ${JOBFLOW_PROD_DB_NAME:?set JOBFLOW_PROD_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JOBFLOW_PROD_DB_USER:?set JOBFLOW_PROD_DB_USER} -d ${JOBFLOW_PROD_DB_NAME:?set JOBFLOW_PROD_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - jobflow_prod_postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["pnpm", "db:migrate"]
    environment:
      JOBFLOW_DATABASE_URL: postgres://${JOBFLOW_PROD_DB_USER:?set JOBFLOW_PROD_DB_USER}:${JOBFLOW_PROD_DB_PASSWORD:?set JOBFLOW_PROD_DB_PASSWORD}@postgres:5432/${JOBFLOW_PROD_DB_NAME:?set JOBFLOW_PROD_DB_NAME}
      JOBFLOW_PERSISTENCE_DRIVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "${JOBFLOW_APP_PORT:-3000}:3000"
    environment:
      JOBFLOW_PERSISTENCE_DRIVER: postgres
      JOBFLOW_DATABASE_URL: postgres://${JOBFLOW_PROD_DB_USER:?set JOBFLOW_PROD_DB_USER}:${JOBFLOW_PROD_DB_PASSWORD:?set JOBFLOW_PROD_DB_PASSWORD}@postgres:5432/${JOBFLOW_PROD_DB_NAME:?set JOBFLOW_PROD_DB_NAME}
      NUXT_PUBLIC_APP_ENV: ${NUXT_PUBLIC_APP_ENV:-prod-like}
      NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-en}
      NUXT_PUBLIC_FALLBACK_LOCALE: ${NUXT_PUBLIC_FALLBACK_LOCALE:-en}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/jobflow/snapshot').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  jobflow_prod_postgres_data:
